name: Solar Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Show trigger
        run: echo "Triggered by ${{ github.event_name }}"

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: curl, pdo, pdo_mysql
          coverage: none

      - name: Ensure folders exist
        run: |
          mkdir -p private
          mkdir -p data

      - name: Write secrets file
        run: |
          cat > private/zcs_secrets.php <<'PHP'
          <?php
          return [
              'cron_key' => '${{ secrets.CRON_KEY }}',
              'db_host' => '${{ secrets.DB_HOST }}',
              'db_name' => '${{ secrets.DB_NAME }}',
              'db_user' => '${{ secrets.DB_USER }}',
              'db_pass' => '${{ secrets.DB_PASS }}',
              'db_charset' => 'utf8mb4',
              'firebase_api_key' => '${{ secrets.FIREBASE_API_KEY }}',
              'zcs_email' => '${{ secrets.ZCS_EMAIL }}',
              'zcs_password' => '${{ secrets.ZCS_PASSWORD }}',
              'graphql_url' => '${{ secrets.GRAPHQL_URL }}',
              'zcs_serials' => [
                  '${{ secrets.ZCS_SERIAL_1 }}',
              ],
              'solarman_site_id' => '${{ secrets.SOLARMAN_SITE_ID }}',
              'solarman_device_id' => '${{ secrets.SOLARMAN_DEVICE_ID }}',
              'solarman_device_sn' => '${{ secrets.SOLARMAN_DEVICE_SN }}',
              'solarman_cookie' => '${{ secrets.SOLARMAN_COOKIE }}',
              'solarman_bearer_token' => '${{ secrets.SOLARMAN_BEARER_TOKEN }}',
          ];
          PHP

      - name: Run live sync
        run: php zcs_solarman_sync.php | tee sync_output.json

      - name: Validate live sync
        run: |
          php -r "
          \$raw = file_get_contents('sync_output.json');
          \$data = json_decode(\$raw, true);

          if (!is_array(\$data)) {
              fwrite(STDERR, 'Output non JSON valido' . PHP_EOL);
              exit(1);
          }

          if (!(\$data['ok'] ?? false)) {
              fwrite(STDERR, 'Sync live fallita' . PHP_EOL);
              if (isset(\$data['error'])) {
                  fwrite(STDERR, \$data['error'] . PHP_EOL);
              }
              exit(1);
          }

          echo 'LIVE_SYNC_OK' . PHP_EOL;
          "

      - name: Save voltage history to DB
        run: php zcs_solarman_history_sync.php | tee history_output.json

      - name: Validate history sync
        run: |
          php -r "
          \$raw = file_get_contents('history_output.json');
          \$data = json_decode(\$raw, true);

          if (!is_array(\$data)) {
              fwrite(STDERR, 'History output non JSON valido' . PHP_EOL);
              exit(1);
          }

          if (!(\$data['ok'] ?? false)) {
              fwrite(STDERR, 'Storico tensione fallito' . PHP_EOL);
              if (isset(\$data['error'])) {
                  fwrite(STDERR, \$data['error'] . PHP_EOL);
              }
              exit(1);
          }

          echo 'HISTORY_SYNC_OK' . PHP_EOL;
          "

      - name: Commit updated JSON files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/heartbeat.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update solar live JSON"
          git push
