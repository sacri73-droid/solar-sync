name: Solar Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Show trigger
        run: echo "Triggered by ${{ github.event_name }}"

      - name: Call remote sync on server
        run: |
          curl -A "Mozilla/5.0" -sS "https://stefanosacripanti.ct.ws/zcs_solarman_sync.php?key=${{ secrets.CRON_KEY }}&_=$(date +%s)" -o sync_output.txt || true

      - name: Show raw response
        run: |
          echo "----- RESPONSE START -----"
          cat sync_output.txt || true
          echo
          echo "----- RESPONSE END -----"

      - name: Soft validate response
        run: |
          php -r "
          \$raw = @file_get_contents('sync_output.txt');
          if (!is_string(\$raw) || trim(\$raw) === '') {
              echo 'Risposta vuota dal server' . PHP_EOL;
              exit(0);
          }
          \$data = json_decode(\$raw, true);
          if (is_array(\$data) && !empty(\$data['ok'])) {
              echo 'SYNC_OK' . PHP_EOL;
              if (isset(\$data['saved_rows'])) {
                  echo 'saved_rows=' . \$data['saved_rows'] . PHP_EOL;
              }
              if (isset(\$data['sample_ts'])) {
                  echo 'sample_ts=' . \$data['sample_ts'] . PHP_EOL;
              }
              exit(0);
          }
          echo 'Risposta non JSON o filtrata dal provider' . PHP_EOL;
          exit(0);
          "
