name: Solar Sync

on:
  workflow_dispatch:
  push:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Show trigger
        run: echo "Triggered by ${{ github.event_name }}"

      - name: Call remote sync on server
        run: |
          curl -sS --fail "https://stefanosacripanti.ct.ws/zcs_solarman_sync.php?key=${{ secrets.CRON_KEY }}&_=$(date +%s)" | tee sync_output.json

      - name: Show response
        run: cat sync_output.json

      - name: Validate response
        run: |
          php -r "
          \$raw = file_get_contents('sync_output.json');
          \$data = json_decode(\$raw, true);

          if (!is_array(\$data)) {
              fwrite(STDERR, 'Output non JSON valido' . PHP_EOL);
              exit(1);
          }

          if (!(\$data['ok'] ?? false)) {
              fwrite(STDERR, 'Sync fallita' . PHP_EOL);
              if (isset(\$data['error'])) {
                  fwrite(STDERR, \$data['error'] . PHP_EOL);
              }
              exit(1);
          }

          echo 'SYNC_OK' . PHP_EOL;

          if (isset(\$data['saved_rows'])) {
              echo 'saved_rows=' . \$data['saved_rows'] . PHP_EOL;
          }

          if (isset(\$data['sample_ts'])) {
              echo 'sample_ts=' . \$data['sample_ts'] . PHP_EOL;
          }
          "
